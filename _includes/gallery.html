<style>
.post-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.75rem;
  margin: 1.5rem 0;
}

.post-gallery-item {
  margin: 0;
}

.post-gallery-item img {
  width: 100%;
  height: auto;
  display: block;
}

.post-gallery-item figcaption {
  margin-top: 0.25rem;
  font-size: 0.8rem;
  text-align: center;
}
</style>

{% assign images = site.gallery | where: "gallery", include.gallery | sort: "index" %}

{% if images.size > 0 %}
<div class="post-gallery">
  {% for image in images %}
    <figure class="post-gallery-item">
      <a href="{{ image.url | relative_url }}">
        <img src="{{ image.thumb_url | escape }}" alt="{{ image.title | escape }}" loading="lazy">
      </a>
      {% if image.title %}
        <figcaption>{{ image.title }}</figcaption>
      {% endif %}
    </figure>
  {% endfor %}
</div>
{% endif %}
