title: KansasPattons
email: jeffrey@kansaspattons.org
description: >-
url: "https://kansaspattons.org"
author: "Jeff Patton"

show_excerpts: true

paginate: 10
paginate_path: /posts/page:num
permalink: /blog/:year/:month/:day/:title.html

include:
  - _pages

markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.28.0"

minimal_mistakes_skin: dirt

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-remote-theme
  - jekyll-include-cache

author:
  name   : "Jeff Patton"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "Just a dad who takes too many pictures."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://patton-tech.com"
    - label: "Bluesky"
      icon: "fab fa-brands fa-bluesky"
      url: "https://bsky.app/profile/jeffpatton.bsky.social"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/jeffpatton1971"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/jspatton1971"

collections:
  gallery:
    sort_by: taken_at
    output: true

defaults:
  # _posts
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: true
      comments: false
      share: false
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "single"
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

