name: API Publish

on:
  push:
    branches:
      - main
    paths:
      - api/**
      - .github/workflows/api-publish.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy-api:
    name: Deploy API
    if: vars.AZURE_API_FUNCTION_APP_NAME != ''
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: ${{ vars.AZURE_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        run: npm --prefix api ci

      - name: Test API
        run: npm --prefix api test

      - name: Build API
        run: npm --prefix api run build

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_API_FUNCTION_APP_NAME }}
          package: api

      - name: Verify API
        if: vars.AZURE_API_BASE_URL != ''
        shell: bash
        run: |
          api_base="${AZURE_API_BASE_URL%/}"

          for attempt in {1..12}; do
            status="$(curl -sS -o /tmp/api-health.json -w '%{http_code}' "$api_base/api/health" || true)"
            if [[ "$status" == "200" ]]; then
              echo "Verified $api_base/api/health"
              exit 0
            fi

            echo "Attempt $attempt: /api/health returned $status"
            sleep 10
          done

          echo "Final /api/health response:"
          cat /tmp/api-health.json || true
          exit 1
        env:
          AZURE_API_BASE_URL: ${{ vars.AZURE_API_BASE_URL }}
