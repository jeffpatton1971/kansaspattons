name: Publish

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      mode:
        description: Publish mode
        required: true
        default: full
        type: choice
        options:
          - full

permissions:
  contents: write
  id-token: write

env:
  CONTENT_SITE_KEY: ${{ vars.CONTENT_SITE_KEY || 'kansaspattons' }}
  CONTENT_SITE_URL: ${{ vars.CONTENT_SITE_URL || vars.AZURE_STATIC_WEB_APP_URL || 'https://happy-sky-045677310.7.azurestaticapps.net' }}
  AZURE_STATIC_WEB_APP_URL: ${{ vars.AZURE_STATIC_WEB_APP_URL || 'https://happy-sky-045677310.7.azurestaticapps.net' }}
  CONTENT_STORAGE_ACCOUNT: ${{ vars.CONTENT_STORAGE_ACCOUNT }}
  CONTENT_STORAGE_CONTAINER: ${{ vars.CONTENT_STORAGE_CONTAINER }}
  CONTENT_STORAGE_PREFIX: ${{ vars.CONTENT_STORAGE_PREFIX }}

jobs:
  incremental-main:
    name: Incremental publish
    if: github.event_name == 'push' && github.ref_type == 'branch'
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: ${{ vars.AZURE_STATIC_WEB_APP_URL || 'https://happy-sky-045677310.7.azurestaticapps.net' }}
    concurrency:
      group: publish-${{ github.ref_name }}
      cancel-in-progress: false
    env:
      PUBLISH_PLAN_BASE: ${{ github.event.before }}
      PUBLISH_PLAN_HEAD: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json

      - name: Install site dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm --prefix api ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate content
        run: npm run content:validate

      - name: Run tests
        run: npm run test

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Plan incremental publish
        run: npm run publish:plan

      - name: Publish planned media
        run: npm run publish:media

      - name: Rewrite source media references
        run: npm run publish:prepare

      - name: Preview local draft media cleanup
        run: npm run publish:cleanup-media

      - name: Remove uploaded local draft media
        run: npm run publish:cleanup-media:write

      - name: Commit publish source updates
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- _posts content/media/index.json)" ]]; then
            echo "No source publish updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- _posts content/media/index.json
          git commit -m "Normalize published media references [skip ci]"
          git push

      - name: Publish planned generated content
        run: npm run publish:content:incremental

      - name: Deploy Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: .
          api_location: api
          output_location: dist
          app_build_command: 'npm run build'
          api_build_command: 'npm run build'

      - name: Verify deployed API
        shell: bash
        run: |
          for attempt in {1..12}; do
            status="$(curl -sS -o /tmp/swa-home.json -w '%{http_code}' "$AZURE_STATIC_WEB_APP_URL/api/home" || true)"
            if [[ "$status" == "200" ]]; then
              echo "Verified $AZURE_STATIC_WEB_APP_URL/api/home"
              exit 0
            fi

            echo "Attempt $attempt: /api/home returned $status"
            sleep 10
          done

          echo "Final /api/home response:"
          cat /tmp/swa-home.json || true
          exit 1

  full-tag:
    name: Full rebuild publish
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: ${{ vars.AZURE_STATIC_WEB_APP_URL || 'https://happy-sky-045677310.7.azurestaticapps.net' }}
    concurrency:
      group: publish-full-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json

      - name: Install site dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm --prefix api ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate content
        run: npm run content:validate

      - name: Run tests
        run: npm run test

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish full generated content
        run: npm run publish:content

      - name: Deploy Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: .
          api_location: api
          output_location: dist
          app_build_command: 'npm run build'
          api_build_command: 'npm run build'

      - name: Verify deployed API
        shell: bash
        run: |
          for attempt in {1..12}; do
            status="$(curl -sS -o /tmp/swa-home.json -w '%{http_code}' "$AZURE_STATIC_WEB_APP_URL/api/home" || true)"
            if [[ "$status" == "200" ]]; then
              echo "Verified $AZURE_STATIC_WEB_APP_URL/api/home"
              exit 0
            fi

            echo "Attempt $attempt: /api/home returned $status"
            sleep 10
          done

          echo "Final /api/home response:"
          cat /tmp/swa-home.json || true
          exit 1
