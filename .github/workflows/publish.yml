name: Publish

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      mode:
        description: Publish mode
        required: true
        default: full
        type: choice
        options:
          - full

permissions:
  contents: write
  id-token: write
  pages: write

env:
  CONTENT_SITE_KEY: ${{ vars.CONTENT_SITE_KEY || 'kansaspattons' }}
  CONTENT_STORAGE_ACCOUNT: ${{ vars.CONTENT_STORAGE_ACCOUNT }}
  CONTENT_STORAGE_CONTAINER: ${{ vars.CONTENT_STORAGE_CONTAINER }}
  CONTENT_STORAGE_PREFIX: ${{ vars.CONTENT_STORAGE_PREFIX }}

jobs:
  incremental-main:
    name: Incremental publish
    if: github.event_name == 'push' && github.ref_type == 'branch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: publish-${{ github.ref_name }}
      cancel-in-progress: false
    env:
      PUBLISH_PLAN_BASE: ${{ github.event.before }}
      PUBLISH_PLAN_HEAD: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json

      - name: Install site dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm --prefix api ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate content
        run: npm run content:validate

      - name: Run tests
        run: npm run test

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Plan incremental publish
        run: npm run publish:plan

      - name: Publish planned media
        run: npm run publish:media

      - name: Rewrite source media references
        run: npm run publish:prepare

      - name: Preview local draft media cleanup
        run: npm run publish:cleanup-media

      - name: Remove uploaded local draft media
        run: npm run publish:cleanup-media:write

      - name: Commit publish source updates
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- _posts content/media/index.json)" ]]; then
            echo "No source publish updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- _posts content/media/index.json
          git commit -m "Normalize published media references [skip ci]"
          git push

      - name: Publish planned generated content
        run: npm run publish:content:incremental

      - name: Build GitHub Pages artifact
        run: npm run build

      - name: Prepare GitHub Pages artifact
        shell: bash
        run: |
          cp CNAME dist/CNAME
          cp dist/index.html dist/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  full-tag:
    name: Full rebuild publish
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: publish-full-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json

      - name: Install site dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm --prefix api ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate content
        run: npm run content:validate

      - name: Run tests
        run: npm run test

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish full generated content
        run: npm run publish:content

      - name: Build GitHub Pages artifact
        run: npm run build

      - name: Prepare GitHub Pages artifact
        shell: bash
        run: |
          cp CNAME dist/CNAME
          cp dist/index.html dist/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
