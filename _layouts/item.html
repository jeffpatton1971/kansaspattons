---
layout: post
---
{% assign postback = page.post %}

<style>
.gallery-photo-frame {
  margin: 1.5rem 0;
  text-align: center;
}

.gallery-photo-frame img {
  max-width: 100%;
  height: auto;
  display: inline-block;
  border-radius: 4px;
}

.gallery-photo-meta {
  color: #666;
  font-size: 0.95rem;
}

.gallery-photo-actions {
  margin: 1.5rem 0;
}

.gallery-photo-actions a {
  display: inline-block;
  margin-right: 1rem;
}
</style>

{% if page.taken_at %}
  <p class="gallery-photo-meta">{{ page.taken_at | date: "%B %-d, %Y" }}</p>
{% endif %}

<figure class="gallery-photo-frame">
  <a href="{{ page.raw_url }}">
    <img src="{{ page.raw_url }}" alt="{{ page.title | escape }}">
  </a>
  {% if page.title %}
    <figcaption>{{ page.title | escape }}</figcaption>
  {% endif %}
</figure>

<div class="gallery-photo-actions">
  {% if postback %}
    <a href="{{ postback }}">Return to post</a>
  {% endif %}
  <a href="{{ '/galleries/' | relative_url }}">View galleries</a>
  <a href="{{ page.raw_url }}">Open full-size image</a>
</div>

{{ content }}
